<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spec_manager</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>spec_manager</h1>
      <div class="bar">
        <input id="q" type="search" placeholder="Search specs across projects…" />
        <select id="project"><option value="">All projects</option></select>
      </div>
    </header>
    <main>
      <section id="results"></section>
      <aside id="detail"><p class="hint">Select a spec to view it.</p></aside>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
